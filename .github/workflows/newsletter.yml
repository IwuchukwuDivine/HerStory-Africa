name: Draft Newsletter

on:
  schedule:
    - cron: "0 9 1,15 * *" # 1st and 15th of every month at 9 AM UTC
  workflow_dispatch:
    inputs:
      feature_slug:
        description: "Pin a specific woman or article slug as the main feature (leave empty for default)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate newsletter draft
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FEATURE_SLUG: ${{ github.event.inputs.feature_slug || '' }}
        run: node scripts/draft-newsletter.mjs

      - name: Commit updated newsletter log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/newsletter-log.json
          git diff --staged --quiet || git commit -m "chore: update newsletter log"
          git push

      - name: Notify draft is ready
        run: |
          SUBJECT=$(node -e "const l=JSON.parse(require('fs').readFileSync('data/newsletter-log.json','utf8'));const e=l.editions[l.editions.length-1];console.log(e.subject)")
          curl -s \
            -H "Title: Newsletter draft ready" \
            -H "Tags: newspaper" \
            -H "Click: https://buttondown.com/emails" \
            -d "Your HerStory Africa newsletter draft is ready: ${SUBJECT}. Review and send it in Buttondown." \
            ntfy.sh/herstory-africa-newsletter
