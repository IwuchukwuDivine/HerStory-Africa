name: Draft Newsletter

on:
  schedule:
    - cron: "0 9 1,15 * *" # 1st and 15th of every month at 9 AM UTC
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

permissions:
  contents: write
  issues: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate newsletter draft
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/draft-newsletter.mjs

      - name: Commit updated newsletter log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/newsletter-log.json
          git diff --staged --quiet || git commit -m "chore: update newsletter log"
          git push

      - name: Notify draft is ready
        uses: actions/github-script@v7
        with:
          script: |
            const log = require('./data/newsletter-log.json');
            const latest = log.editions[log.editions.length - 1];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📰 Newsletter draft ready: "${latest.subject}"`,
              body: [
                `A new newsletter draft has been created in your Buttondown dashboard.`,
                ``,
                `**Subject:** ${latest.subject}`,
                `**Type:** ${latest.type}`,
                `**Spotlight:** ${latest.mainFeature}`,
                `**Date:** ${latest.date}`,
                ``,
                `👉 [Review and send in Buttondown](https://buttondown.com/emails)`,
                ``,
                `_Close this issue after you've reviewed and sent the newsletter._`,
              ].join('\n'),
              labels: ['newsletter'],
            });
